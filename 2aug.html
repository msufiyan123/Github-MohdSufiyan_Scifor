<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Form</title>
    <link rel="stylesheet" href="ust.css">
</head>
<body>
    <div class="container">
        <form id="simpleForm">
            <label for="name">Name </label>
            <input type="text" id="name" name="name" required pattern="[A-Z\s]+" title="Uppercase letters only">

            <label for="username">Username </label>
            <input type="text" id="username" name="username" required pattern="[A-Z]+" title="Uppercase letters only">

            <label for="password">Password </label>
            <input type="password" id="password" name="password" required pattern="[A-Z]+" title="Uppercase letters only">

            <label for="age">Age </label>
            <input type="number" id="age" name="age" required min="20" max="60">

            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
